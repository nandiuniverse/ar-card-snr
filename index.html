<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <title>AR Business Card - SNR LAB</title>
    
    <!-- Librerías Base -->
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.2.0/dist/aframe-extras.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/fcor/aframe-gesture-handler@master/dist/aframe-gesture-handler.min.js"></script>

    <script>
      // 1. COMPONENTE OCULTADOR: Crea la barrera invisible con la forma troquelada
      AFRAME.registerComponent('ocultador', {
        init: function () {
          let mesh = this.el.getObject3D('mesh');
          if (mesh) {
            // No dibuja colores (lo hace invisible)
            mesh.material.colorWrite = false;
            // Lo renderiza primero para "cortar" la profundidad de lo que pasa por atrás
            mesh.renderOrder = -1; 
          }
        }
      });

      // 2. COMPONENTE MAESTRO: Lógica de animaciones y video
      AFRAME.registerComponent('logica-interactiva', {
        init: function () {
          const el = this.el;
          const target = document.querySelector('#tarjeta-target');
          const vidAsset = document.querySelector('#mi-video');
          const vidEntidad = document.querySelector('#entidad-video');
          const luzEscaner = document.querySelector('#luz-escaner');

          // Animación 3D en loop desde el inicio
          el.addEventListener('model-loaded', () => {
            el.setAttribute('animation-mixer', {
              clip: "*", 
              loop: 'repeat',
              timeScale: 1.0
            });
          });

          // Detecta la tarjeta
          target.addEventListener("targetFound", () => {
            vidAsset.play();
            
            // Apertura del video (escala)
            vidEntidad.setAttribute('animation', 'property: scale; from: 1 0 1; to: 1 1 1; dur: 1000; easing: easeOutElastic');

            // Barrido del láser (Ajustado para el alto de 1.5)
            luzEscaner.setAttribute('animation__movimiento', 'property: position; from: 0 0.8 0.01; to: 0 -0.8 0.01; dur: 1500; easing: easeInOutSine');
            luzEscaner.setAttribute('animation__brillo', 'property: material.opacity; from: 0; to: 0.8; dur: 750; dir: alternate; loop: 2');
          });

          // Pierde la tarjeta
          target.addEventListener("targetLost", () => {
            vidAsset.pause();
            
            vidEntidad.removeAttribute('animation');
            luzEscaner.removeAttribute('animation__movimiento');
            luzEscaner.removeAttribute('animation__brillo');

            vidEntidad.setAttribute('scale', '1 0 1');
            luzEscaner.setAttribute('position', '0 0.8 0.01'); 
            luzEscaner.setAttribute('material', 'opacity', 0);
          });

          // Link Interactivo
          el.addEventListener('click', () => {
            window.open('https://snrlab.xyz', '_blank');
          });
        }
      });
    </script>
  </head>
  
  <body>
    <a-scene mindar-image="imageTargetSrc: ./assets/tarjeta_snr.mind; autoStart: true; filterMinCF: 0.0005; filterBeta: 0.1;" 
             color-space="sRGB" 
             renderer="colorManagement: true, physicallyCorrectLights" 
             vr-mode-ui="enabled: false" 
             device-orientation-permission-ui="enabled: false"
             gesture-detector
             cursor="fuse: false; rayOrigin: mouse"
             raycaster="objects: .clickable">
      
      <!-- Carga de Archivos -->
      <a-assets>
        <a-asset-item id="modelo-3d" src="./assets/snr_business_card.glb"></a-asset-item>
        <video id="mi-video" src="./assets/reel_snrlab.mp4" preload="auto" loop muted playsinline webkit-playsinline></video> 
        
        <!-- Máscaras (Alpha Maps) -->
        <img id="mascara-video" src="./assets/mascara_redondeada.png">
        <img id="mascara-tarjeta" src="./assets/silueta_tarjeta.png">
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity id="tarjeta-target" mindar-image-target="targetIndex: 0">
        
        <!-- 0. EL OCULTADOR (Holdout) adaptado a la tarjeta troquelada -->
        <!-- alphaTest: 0.5 asegura que las zonas negras de tu máscara no "tapen" el 3D -->
        <a-plane ocultador 
                 material="alphaMap: #mascara-tarjeta; alphaTest: 0.5" 
                 position="0 0 0" 
                 width="1" 
                 height="1.5">
        </a-plane>

        <!-- 1. EL LÁSER ESCÁNER -->
        <a-plane id="luz-escaner" 
                 width="1.1" 
                 height="0.08" 
                 position="0 0.8 0.01" 
                 color="#00FF44" 
                 material="shader: flat; transparent: true; opacity: 0; blending: additive">
        </a-plane>

        <!-- 2. EL VIDEO HOLOGRÁFICO (Ahora como plano con alphaMap) -->
        <a-plane id="entidad-video"
                 position="0 0 1" 
                 rotation="0 0 0" 
                 width="1.5" 
                 height="0.84375"
                 scale="1 0 1"
                 material="src: #mi-video; alphaMap: #mascara-video; transparent: true; opacity: 0.85; shader: flat; side: double">
        </a-plane>

        <!-- 3. EL MODELO 3D INTERACTIVO -->
        <a-entity gltf-model="#modelo-3d" 
                  id="logo-snr"
                  class="clickable"
                  position="0 0 0" 
                  rotation="90 0 0"
                  scale="1 1 1" 
                  gesture-handler
                  logica-interactiva>
        </a-entity>

      </a-entity>
    </a-scene>
  </body>
</html>
