<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <title>AR Business Card - SNR LAB</title>
    
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.2.0/dist/aframe-extras.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/fcor/aframe-gesture-handler@master/dist/aframe-gesture-handler.min.js"></script>

    <script>
      // -----------------------------------------------------
      // SHADER 1: BARRIDO ESCÁNER 
      // -----------------------------------------------------
      AFRAME.registerShader('escaner-silueta', {
        schema: {
          mascara: {type: 'map', is: 'uniform'},
          colorLinea: {type: 'color', is: 'uniform', default: '#16d957'},
          posicionY: {type: 'number', is: 'uniform', default: 1.2}
        },
        vertexShader: `
          varying vec2 vUv;
          void main() {
            vUv = uv;
            gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
          }
        `,
        fragmentShader: `
          uniform sampler2D mascara;
          uniform vec3 colorLinea;
          uniform float posicionY;
          varying vec2 vUv;

          void main() {
            vec4 colorMascara = texture2D(mascara, vUv);
            if (colorMascara.r < 0.5) discard;
            
            float grosor = 0.20; 
            float distancia = abs(vUv.y - posicionY);
            
            float intensidad = smoothstep(grosor, 0.0, distancia) * 0.7; 
            
            gl_FragColor = vec4(colorLinea, intensidad);
          }
        `
      });

      // -----------------------------------------------------
      // SHADER 2: VIDEO RECORTADO A PRUEBA DE BALAS
      // -----------------------------------------------------
      AFRAME.registerShader('video-redondeado', {
        schema: {
          src: {type: 'map', is: 'uniform'},      
          mascara: {type: 'map', is: 'uniform'}   
        },
        vertexShader: `
          varying vec2 vUv;
          void main() {
            vUv = uv;
            gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
          }
        `,
        fragmentShader: `
          uniform sampler2D src;
          uniform sampler2D mascara;
          varying vec2 vUv;

          void main() {
            vec4 colorVideo = texture2D(src, vUv);
            vec4 colorMascara = texture2D(mascara, vUv);
            
            if (colorMascara.r < 0.5) discard;
            
            gl_FragColor = colorVideo;
          }
        `
      });

      // COMPONENTE OCULTADOR
      AFRAME.registerComponent('ocultador', {
        init: function () {
          let mesh = this.el.getObject3D('mesh');
          if (mesh) {
            mesh.material.colorWrite = false;
            mesh.renderOrder = -1; 
          }
        }
      });

      // COMPONENTE MAESTRO
      AFRAME.registerComponent('logica-interactiva', {
        init: function () {
          const el = this.el;
          const target = document.querySelector('#tarjeta-target');
          const vidAsset = document.querySelector('#mi-video');
          const vidEntidad = document.querySelector('#entidad-video');
          const barrido = document.querySelector('#barrido-tarjeta'); 

          el.addEventListener('model-loaded', () => {
            el.setAttribute('animation-mixer', { clip: "*", loop: 'repeat', timeScale: 1.0 });
          });

          target.addEventListener("targetFound", () => {
            vidAsset.play();
            
            vidEntidad.setAttribute('animation', 'property: scale; from: 1 0 1; to: 1 1 1; dur: 1000; easing: easeOutElastic');

            barrido.setAttribute('visible', 'true');
            barrido.setAttribute('animation__scan', 'property: material.posicionY; from: 1.2; to: -0.2; dur: 2500; loop: true; dir: alternate; easing: easeInOutSine');
          });

          target.addEventListener("targetLost", () => {
            vidAsset.pause();
            
            vidEntidad.removeAttribute('animation');
            barrido.removeAttribute('animation__scan'); 

            vidEntidad.setAttribute('scale', '1 0 1');
            barrido.setAttribute('visible', 'false'); 
          });

          el.addEventListener('click', () => {
            window.open('https://snrlab.xyz', '_blank');
          });
        }
      });
    </script>
  </head>
  
  <body>
    <!-- VOLVIMOS A LOS VALORES ORIGINALES: filterMinCF: 0.0005 y filterBeta: 0.1 -->
    <a-scene mindar-image="imageTargetSrc: ./assets/tarjeta_snr.mind; autoStart: true; filterMinCF: 0.0005; filterBeta: 0.1;" 
             color-space="sRGB" 
             renderer="colorManagement: true, physicallyCorrectLights" 
             vr-mode-ui="enabled: false" 
             device-orientation-permission-ui="enabled: false"
             gesture-detector
             cursor="fuse: false; rayOrigin: mouse"
             raycaster="objects: .clickable">
      
      <a-assets>
        <a-asset-item id="modelo-3d" src="./assets/snr_business_card.glb"></a-asset-item>
        <video id="mi-video" src="./assets/reel_snrlab.mp4" preload="auto" loop muted playsinline webkit-playsinline></video> 
        
        <img id="mascara-video" src="./assets/mascara_redondeada.png">
        <img id="mascara-tarjeta" src="./assets/silueta_tarjeta.png">
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity id="tarjeta-target" mindar-image-target="targetIndex: 0">
        
        <a-plane ocultador 
                 material="alphaMap: #mascara-tarjeta; alphaTest: 0.5" 
                 position="0 0 0" 
                 width="1" 
                 height="1.5">
        </a-plane>

        <a-plane id="barrido-tarjeta" 
                 position="0 0 0.005" 
                 width="1" 
                 height="1.5"
                 visible="false"
                 material="shader: escaner-silueta; mascara: #mascara-tarjeta; colorLinea: #16d957; transparent: true; blending: additive">
        </a-plane>

        <a-plane id="entidad-video"
                 position="0 0 1" 
                 rotation="0 0 0" 
                 width="1.5" 
                 height="0.84375"
                 scale="1 0 1"
                 material="shader: video-redondeado; src: #mi-video; mascara: #mascara-video; transparent: true; side: double">
        </a-plane>

        <a-entity gltf-model="#modelo-3d" 
                  id="logo-snr"
                  class="clickable"
                  position="0 0 0" 
                  rotation="90 0 0"
                  scale="1 1 1" 
                  gesture-handler
                  logica-interactiva>
        </a-entity>

      </a-entity>
    </a-scene>
  </body>
</html>
