<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AR Business Card - SNR LAB</title>
    
    <!-- Librerías -->
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.2.0/dist/aframe-extras.min.js"></script>

    <!-- COMPONENTE NUEVO: Secuencia de animaciones -->
    <script>
      AFRAME.registerComponent('secuencia-animaciones', {
        init: function () {
          const el = this.el;

          // 1. Ayudante: Imprime en consola los nombres de tus animaciones
          el.addEventListener('model-loaded', () => {
            const mesh = el.getObject3D('mesh');
            if (mesh && mesh.animations) {
              console.log("👉 NOMBRES DE TUS ANIMACIONES EN EL GLB:", mesh.animations.map(a => a.name));
            }
          });

          // 2. Arrancar con la animación de ENTRADA (Una sola vez)
          // REEMPLAZÁ 'NombreTuAnimacionEntrada' POR EL NOMBRE REAL
          el.setAttribute('animation-mixer', 'clip: NombreTuAnimacionEntrada; loop: once; crossFadeDuration: 0.2');

          // 3. Cuando termina la entrada, pasamos a la FLOTACIÓN (En loop)
          el.addEventListener('animation-finished', () => {
            // REEMPLAZÁ 'NombreTuAnimacionFlotacion' POR EL NOMBRE REAL
            el.setAttribute('animation-mixer', 'clip: NombreTuAnimacionFlotacion; loop: repeat; crossFadeDuration: 0.4');
          });
        }
      });
    </script>

    <!-- Script del Video -->
    <script>
      document.addEventListener("DOMContentLoaded", function() {
        const target = document.querySelector('#tarjeta-target');
        const vid = document.querySelector('#mi-video');

        target.addEventListener("targetFound", event => vid.play());
        target.addEventListener("targetLost", event => vid.pause());
      });
    </script>
  </head>
  
  <body>
    <a-scene mindar-image="imageTargetSrc: ./assets/tarjeta_snr.mind; autoStart: true;" 
             color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" 
             vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <a-asset-item id="modelo-3d" src="./assets/snr_business_card.glb"></a-asset-item>
        <video id="mi-video" src="./assets/reel_snrlab.mp4" preload="auto" loop muted playsinline webkit-playsinline></video> 
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity id="tarjeta-target" mindar-image-target="targetIndex: 0">
        
        <a-video src="#mi-video" position="0 0.5 0" rotation="90 0 0" width="1" height="0.5625"></a-video>

        <!-- EL MODELO 3D: Le quitamos el animation-mixer y le agregamos nuestro componente 'secuencia-animaciones' -->
        <a-entity gltf-model="#modelo-3d" 
                  position="0 0 0" 
                  scale="0.5 0.5 0.5" 
                  secuencia-animaciones>
        </a-entity>

      </a-entity>
    </a-scene>
  </body>
</html>
