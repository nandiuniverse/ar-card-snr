<script>
  AFRAME.registerComponent('secuencia-snr', {
    init: function () {
      const el = this.el;

      el.addEventListener('model-loaded', () => {
        // Forzamos un pequeño retraso de 100ms para que el motor 3D respire
        setTimeout(() => {
          // 1. Ejecutamos TODO lo que diga inicio una sola vez
          el.setAttribute('animation-mixer', {
            clip: "*nicio*", 
            loop: 'once',
            clampWhenFinished: true, // Se queda quieto al terminar en lugar de desaparecer
            crossFadeDuration: 0
          });
        }, 100);
      });

      // 2. Escuchamos el final para pasar a la flotación
      el.addEventListener('animation-finished', (e) => {
        // Solo cambiamos si lo que terminó fue una animación de inicio
        if (e.detail.action._clip.name.toLowerCase().includes('inicio')) {
          el.setAttribute('animation-mixer', {
            clip: "*lotacion*",
            loop: 'repeat',
            crossFadeDuration: 0.5 // Transición suave entre estados
          });
        }
      });
    }
  });
</script>
